services:
  db:
    image: postgres:15-alpine
    container_name: zinclasDB
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ZinclasDB
    volumes:
      - postgres_data:/var/lib/postgresql/data
  api:
    build: .
    container_name: zinclas_api
    ports:
      - "5019:5019"
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=ZinclasDB;User id=postgres;Password=password;

volumes:
  postgres_data:

